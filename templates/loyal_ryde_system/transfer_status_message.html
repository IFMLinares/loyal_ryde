{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loyal Ride - Estado de traslado</title>
    <link rel="shortcut icon" href="{% static 'assets/media/logos/favicon.ico'%}" />
    <link href="{% static 'assets/css/custom.css'%}" rel="stylesheet" type="text/css" />
    <link href="{% static 'assets/plugins/global/plugins.bundle.css' %}" rel="stylesheet" type="text/css" />
    <link href="{% static 'assets/css/style.bundle.css' %}" rel="stylesheet" type="text/css" />
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <style>
        body {
            background: #f4f6f9;
            font-family: 'Poppins', sans-serif;
        }
        .centered-box {
            max-width: 500px;
            margin: 80px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 40px 30px;
            text-align: center;
        }
        .centered-box h2 {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .centered-box .btn {
            margin-top: 30px;
        }
    </style>
</head>
<body>
    {% if message %}
    <div class="centered-box" data-aos="fade-up">
        <img src="{% static 'assets/media/logos/logo-01.png' %}" alt="Loyal Ride" style="width:120px; margin-bottom:20px;">
        <h2>{{ message }}</h2>
    </div>
    {% else %}
    <div class="centered-box" data-aos="fade-up">
        <img src="{% static 'assets/media/logos/logo-01.png' %}" alt="Loyal Ride" style="width:120px; margin-bottom:20px;">
        {% if action == 'start' %}
            <h2>¿Iniciar traslado?</h2>
            <button id="action-btn" class="btn btn-primary">Iniciar Traslado</button>
        {% elif action == 'finish' %}
            <h2>Finalizar traslado</h2>
            <div class="mb-3">
                <label for="comprobante" class="form-label">Comprobante (imagen) - obligatorio</label>
                <input class="form-control" type="file" id="comprobante" accept="image/*" />
            </div>
            <button id="action-btn" class="btn btn-success">Finalizar Traslado</button>
        {% else %}
            <h2>Acción</h2>
        {% endif %}
    </div>
    {% endif %}
    <script src="{% static 'assets/plugins/global/plugins.bundle.js' %}"></script>
    <script src="{% static 'assets/js/scripts.bundle.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        AOS.init();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        (function(){
            const actionBtn = document.getElementById('action-btn');
            if(!actionBtn) return;
            // Obtener encoded id desde query param o contexto
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('id') || '{{ encoded_id|default:"" }}';

            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }

            actionBtn.addEventListener('click', function(){
                const formData = new FormData();
                formData.append('id', encoded);
                {% if action == 'finish' %}
                const fileInput = document.getElementById('comprobante');
                if(!fileInput || !fileInput.files[0]){
                    Swal.fire({ icon: 'warning', title: 'Atención', text: 'Debe seleccionar un comprobante antes de finalizar.' });
                    return;
                }
                formData.append('comprobante', fileInput.files[0]);
                {% endif %}

                fetch(window.location.href, {
                    method: 'POST',
                    headers: { 'X-CSRFToken': getCookie('csrftoken') },
                    body: formData,
                    credentials: 'same-origin'
                }).then(r=>r.json()).then(data=>{
                    if(data.status === 'success'){
                        Swal.fire({ icon: 'success', title: 'Éxito', text: data.message }).then(()=>{ location.reload(); });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: data.message });
                    }
                }).catch(()=>{
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Error de comunicación.' });
                });
            });
        })();
    </script>
</body>
</html>
