{% load static %}
<!DOCTYPE html>
<html lang="es">
	<!--begin::Head-->
	<head><base href="../../../">
		<title>Loyal Ride{% block title %}{% endblock title %}</title>
		<meta charset="utf-8" />
		<meta
			name="description"
			content="Sistema de administración loyal Ride"
		/>
		<meta name="keywords" content="" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta property="og:locale" content="en_ES" />
		<meta property="og:type" content="article" />
		<meta property="og:title" content="" />
		<meta property="og:url" content="" />
		<meta property="og:site_name" content="" />
		<link
			rel="shortcut icon"
			href="{% static 'assets/media/logos/favicon.ico'%}"
		/>
		<link href="{% static 'assets/css/custom.css'%}" rel="stylesheet" type="text/css" />
		<!--begin::Fonts-->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
		<!--end::Fonts-->
		<!--begin::Global Stylesheets Bundle(used by all pages)-->
		<link href="{% static 'assets/plugins/global/plugins.bundle.css'%}" rel="stylesheet" type="text/css" />
		<link href="{% static 'assets/css/style.bundle.css'%}" rel="stylesheet" type="text/css" />
		<!--end::Global Stylesheets Bundle-->
	</head>
	<!--end::Head-->
	<!--begin::Body-->
	<body id="kt_body" class="bg-light">
		<!--begin::Main-->
		<!--begin::Root-->
		<div class="d-flex flex-column flex-root">
			<!--begin::Authentication - Sign-in -->
			<div class="d-flex flex-column flex-column-fluid bgi-position-y-bottom position-x-center bgi-no-repeat bgi-size-contain bgi-attachment-fixed" style="background-image: url({% static 'assets/media/illustrations/sketchy-1/14.png' %}">
				<!--begin::Content-->
				<div class="d-flex flex-center flex-column flex-column-fluid p-10 pb-lg-20">
					<!--begin::Logo-->
					<a href="" class="mb-12">
						<img alt="Logo" src="{% static 'assets/media/logos/logo-01.png' %}" class="h-100px" />
					</a>
					<!--end::Logo-->
					<!--begin::Wrapper-->
                    {% block content %}
                    {% endblock content %}
					<!--end::Wrapper-->
				</div>
			</div>
		</div>
		<!--end::Root-->
		<!--end::Main-->
		<!--begin::Javascript-->
		<script>var hostUrl = "assets/";</script>
		<!--begin::Global Javascript Bundle(used by all pages)-->
		<script src="{% static 'assets/plugins/global/plugins.bundle.js'%}"></script>
		<script src="{% static 'assets/js/scripts.bundle.js'%}"></script>
		<!--end::Global Javascript Bundle-->
		<!--begin::Page Custom Javascript(used by this page)-->
		<script src="{% static 'assets/js/sweetalert2/sweet-alert-2-11.js'%}"></script>
		<!--end::Page Custom Javascript-->
		<!--end::Javascript-->
		<!-- Render Django messages into a plain JS array for external handling -->
		<script>
			// Export Django messages as objects with text and level (tags)
			window.djangoMessages = [
				{% for message in messages %}
					{"text": "{{ message|escapejs }}", "level": "{{ message.tags }}"},
				{% endfor %}
			];

			(function(){
				var msgs = window.djangoMessages || [];
				if (!msgs.length) return;

				var logoutTexts = [
					'Ha cerrado sesión.',
					'Sesión cerrada. Respira profundo, todo está bajo control'
				];

				var isLogout = msgs.some(function(m){ return logoutTexts.indexOf(m.text) !== -1; });

				if (isLogout) {
					Swal.fire({
						title: 'Sesión cerrada',
						text: 'Respira profundo, todo está bajo control.',
						icon: 'success',
						timer: 3000,
						showConfirmButton: false
					});
					return;
				}

				// Show messages according to their level tag
				msgs.forEach(function(m){
					var level = (m.level || '').toLowerCase();
					if (level.indexOf('success') !== -1) {
						Swal.fire({title: 'Éxito', text: m.text, icon: 'success', timer: 3000, showConfirmButton: false});
					} else if (level.indexOf('error') !== -1) {
						Swal.fire({title: 'Error!', text: m.text, icon: 'error'});
					} else if (level.indexOf('warning') !== -1) {
						Swal.fire({title: 'Advertencia', text: m.text, icon: 'warning'});
					} else {
						// default to info
						Swal.fire({title: 'Información', text: m.text, icon: 'info'});
					}
				});
			})();
		</script>
		{% block error_js %}

		<!-- Export form errors to a plain JS array for external handling -->
		<script>
			window.djangoFormErrors = (function(){
				var arr = [];
				{% if form and form.errors %}
					{% for field in form %}
						{% for error in field.errors %}
							arr.push("{{ field.label|title|escapejs }}: {{ error|escapejs }}");
						{% endfor %}
					{% endfor %}
					{% for error in form.non_field_errors %}
						arr.push("{{ error|escapejs }}");
					{% endfor %}
				{% endif %}
				return arr;
			})();

			(function(){
				var errs = window.djangoFormErrors || [];
				if (!errs.length) return;

				var html = errs.map(function(e){ return '<p style="margin-top:7px;margin-bottom:7px;">' + e + '</p>'; }).join('');

				Swal.fire({
					title: 'Error!',
					html: html,
					icon: 'error',
					width: 500,
					height: 700
				});
			})();
		</script>

		{% endblock error_js %}
	</body>
	<!--end::Body-->
</html>
